name: Switch to Windows containers
description: >
  Switches Docker to Windows containers mode.
  Uses DockerCli.exe on Docker Desktop (local dev) or merges the storage-driver
  key into the existing daemon.json on Docker Engine (GitHub Actions runners).

runs:
  using: composite
  steps:
    - name: Switch to Windows containers
      shell: pwsh
      run: |
        # Skip if already in Windows containers mode (idempotent on re-runs).
        $info = docker info 2>&1
        if ($info -match "OSType: windows") {
          Write-Host "Docker already in Windows containers mode — skipping switch."
          exit 0
        }

        $dockerCli = "$env:ProgramFiles\Docker\Docker\DockerCli.exe"
        if (Test-Path $dockerCli) {
          # Docker Desktop (local dev) — explicit daemon switch
          & $dockerCli -SwitchDaemon
        } else {
          # Docker Engine (GitHub Actions) — write a Windows-mode daemon.json.
          # We keep only the 'hosts' binding from the existing file (needed for
          # the Docker client to connect) and drop Linux-specific keys (storage,
          # bridge, network-mode, etc.) that conflict with Windows container mode.
          $daemonJson = "$env:ProgramData\docker\config\daemon.json"
          Write-Host "Original daemon.json: $(if (Test-Path $daemonJson) { Get-Content $daemonJson -Raw } else { '<missing>' })"

          $hosts = $null
          if (Test-Path $daemonJson) {
            $orig = Get-Content $daemonJson -Raw | ConvertFrom-Json
            $hosts = $orig.PSObject.Properties['hosts']?.Value
          }
          $cfg = [ordered]@{ 'storage-driver' = 'windowsfilter' }
          if ($hosts) { $cfg['hosts'] = $hosts }
          $json = $cfg | ConvertTo-Json -Compress
          Write-Host "New daemon.json: $json"
          [System.IO.File]::WriteAllText($daemonJson, $json, [System.Text.UTF8Encoding]::new($false))

          Stop-Service docker -Force
          # HNS holds stale Linux overlay networks from the previous Docker mode.
          # Restarting it clears that state so Docker can create the Windows nat network.
          Restart-Service hns
          Start-Sleep -Seconds 10
          # HNS initialization can be slow; retry docker start to handle the transient
          # "hnsCall failed: The system cannot find the file specified. (0x2)" race.
          # Start-Service can succeed while the daemon immediately crashes on HNS init,
          # so after each start we poll docker info to confirm the daemon is actually up.
          # If it is not, we stop the service, restart HNS, and try again.
          $started = $false
          for ($attempt = 1; $attempt -le 5; $attempt++) {
            try {
              Start-Service docker -ErrorAction Stop
            } catch {
              Write-Warning "Docker service start attempt $attempt failed ($($_.Exception.Message))."
              if ($attempt -lt 5) {
                Stop-Service docker -Force -ErrorAction SilentlyContinue
                Restart-Service hns
                Start-Sleep -Seconds 10
              }
              continue
            }
            # Verify daemon is responsive — service may start but daemon can crash on HNS init.
            $ready = $false
            for ($check = 1; $check -le 6; $check++) {
              Start-Sleep -Seconds 5
              $info = docker info 2>&1
              if ($info -match "OSType") { $ready = $true; break }
            }
            if ($ready) { $started = $true; break }
            Write-Warning "Docker started but daemon not responsive on attempt $attempt, retrying..."
            Stop-Service docker -Force -ErrorAction SilentlyContinue
            Restart-Service hns
            Start-Sleep -Seconds 10
          }
          if (-not $started) {
            Write-Error "Docker failed to start. Event log:`n$(Get-EventLog Application -Source '*docker*' -Newest 5 -ErrorAction SilentlyContinue | ForEach-Object { $_.Message } | Out-String)"
            throw "Docker failed to start after 5 attempts."
          }
        }
        $deadline = (Get-Date).AddSeconds(60)
        do { Start-Sleep -Seconds 3; $info = docker info 2>&1 } while ((Get-Date) -lt $deadline -and ($info -notmatch "OSType: windows"))
        if ($info -notmatch "OSType: windows") { throw "Docker is not in Windows containers mode`n$info" }
