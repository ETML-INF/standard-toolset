name: Switch to Windows containers
description: >
  Switches Docker to Windows containers mode.
  Uses DockerCli.exe on Docker Desktop (local dev) or merges the storage-driver
  key into the existing daemon.json on Docker Engine (GitHub Actions runners).

runs:
  using: composite
  steps:
    - name: Switch to Windows containers
      shell: pwsh
      run: |
        # Probe Docker — daemon may or may not be running yet.
        $info = docker info 2>&1
        if ($info -match "OSType: windows") {
          Write-Host "Docker already in Windows containers mode — skipping switch."
          exit 0
        }

        $dockerCli = "$env:ProgramFiles\Docker\Docker\DockerCli.exe"
        if (Test-Path $dockerCli) {
          # Docker Desktop (local dev) — explicit daemon switch.
          & $dockerCli -SwitchDaemon
        } else {
          # Docker Engine (GitHub Actions).
          # $info tells us whether the daemon was running and in which mode.
          # OSType present  → daemon was up (Linux mode, since Windows was caught above).
          # OSType absent   → daemon was not running (most common on windows-2022 runners).
          $wasRunningLinux = $info -match "OSType: linux"

          $daemonJson = "$env:ProgramData\docker\config\daemon.json"
          Write-Host "Original daemon.json: $(if (Test-Path $daemonJson) { Get-Content $daemonJson -Raw } else { '<missing>' })"

          $hosts = $null
          if (Test-Path $daemonJson) {
            $orig = Get-Content $daemonJson -Raw | ConvertFrom-Json
            $hosts = $orig.PSObject.Properties['hosts']?.Value
          }

          # Stop Docker only if it was actually running.
          if ($wasRunningLinux) { Stop-Service docker -Force }

          # Write Windows-mode daemon.json.
          # Keep only the 'hosts' binding from the existing file and drop
          # Linux-specific keys that conflict with Windows container mode.
          $cfg = [ordered]@{ 'storage-driver' = 'windowsfilter' }
          if ($hosts) { $cfg['hosts'] = $hosts }
          $json = $cfg | ConvertTo-Json -Compress
          Write-Host "New daemon.json: $json"
          [System.IO.File]::WriteAllText($daemonJson, $json, [System.Text.UTF8Encoding]::new($false))

          # Helper: full HNS + WinNAT reset.
          # Only needed when Docker was running in Linux mode (stale overlay networks
          # in HNS.data), OR as a recovery step when Docker fails to start cleanly.
          # IMPORTANT: do NOT call this when Docker was never running — deleting
          # HNS.data removes the existing nat network that Docker needs, and
          # recreating it fails with hnsCall 0x2 on a clean runner.
          function Reset-HNS {
            Write-Host "Performing HNS reset..."
            # Remove stale non-nat HNS networks while HNS is still up.
            try {
              $stale = Get-HNSNetwork -ErrorAction SilentlyContinue |
                         Where-Object { $_.Type -notin @('nat','l2bridge','l2tunnel') }
              foreach ($net in $stale) {
                Write-Host "  Removing stale HNS network: $($net.Name) (type=$($net.Type))"
                $net | Remove-HNSNetwork -ErrorAction SilentlyContinue
              }
            } catch { Write-Warning "HNS API cleanup skipped: $_" }

            Stop-Service hns -Force
            $hnsData   = "$env:ProgramData\Microsoft\Windows\HNS\HNS.data"
            $hnsPolicy = "$env:ProgramData\Microsoft\Windows\HNS\Policy"
            foreach ($p in @($hnsData, $hnsPolicy)) {
              if (Test-Path $p) {
                Write-Host "  Dropping HNS state: $p"
                Remove-Item -Path $p -Recurse -Force -ErrorAction SilentlyContinue
              }
            }
            Start-Service hns
            $hnsReady = $false
            for ($h = 1; $h -le 12; $h++) {
              Start-Sleep -Seconds 5
              $svc = Get-Service hns -ErrorAction SilentlyContinue
              if ($svc -and $svc.Status -eq 'Running') { $hnsReady = $true; break }
            }
            if (-not $hnsReady) { throw "HNS did not reach Running state." }
            Start-Sleep -Seconds 5

            Get-NetNat -ErrorAction SilentlyContinue |
              Remove-NetNat -Confirm:$false -ErrorAction SilentlyContinue
            Restart-Service winnat -ErrorAction SilentlyContinue
            Start-Sleep -Seconds 3
          }

          # If Docker was in Linux mode, clean HNS before first start attempt.
          if ($wasRunningLinux) { Reset-HNS }

          # Attempt to start Docker, with one HNS-reset fallback if the first
          # attempt fails (covers the case where the runner has stale HNS state
          # even though Docker was not running).
          $started  = $false
          $hnsDone  = $wasRunningLinux   # track whether we already reset HNS
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            Stop-Service docker -Force -ErrorAction SilentlyContinue
            try {
              Start-Service docker -ErrorAction Stop
            } catch {
              Write-Warning "Docker service start attempt $attempt failed: $($_.Exception.Message)"
              if (-not $hnsDone) { Reset-HNS; $hnsDone = $true }
              continue
            }
            $ready = $false
            for ($check = 1; $check -le 8; $check++) {
              Start-Sleep -Seconds 5
              $info = docker info 2>&1
              if ($info -match "OSType") { $ready = $true; break }
            }
            if ($ready) { $started = $true; break }
            Write-Warning "Docker started but daemon not responsive on attempt $attempt."
            if (-not $hnsDone) { Reset-HNS; $hnsDone = $true }
          }
          if (-not $started) {
            Write-Error "Docker failed to start. Event log:`n$(Get-EventLog Application -Source '*docker*' -Newest 10 -ErrorAction SilentlyContinue | ForEach-Object { $_.Message } | Out-String)"
            throw "Docker failed to start after 3 attempts."
          }
        }
        $deadline = (Get-Date).AddSeconds(60)
        do { Start-Sleep -Seconds 3; $info = docker info 2>&1 } while ((Get-Date) -lt $deadline -and ($info -notmatch "OSType: windows"))
        if ($info -notmatch "OSType: windows") { throw "Docker is not in Windows containers mode`n$info" }
