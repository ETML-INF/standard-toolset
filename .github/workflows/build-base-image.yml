name: Build base test image

on:
  workflow_dispatch:        # manual trigger — rebuild on demand
  push:
    branches: [main]
    paths:
      - tests/Dockerfile.build-base   # auto-rebuild when the base definition changes

env:
  RUNNER: windows-2022   # pin OS build for process-isolation containers (ltsc2022 = build 20348)

jobs:
  build-and-push:
    runs-on: ${{ env.RUNNER }}

    permissions:
      packages: write       # required to push to GHCR

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/switch-docker-windows

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push
        shell: pwsh
        run: |
          $image = "ghcr.io/${{ github.repository_owner }}/standard-toolset/build-base:latest"
          docker build `
            --network nat `
            -f tests/Dockerfile.build-base `
            -t $image `
            .
          docker push $image
          Write-Host "Pushed: $image" -ForegroundColor Green
