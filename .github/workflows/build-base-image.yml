name: Build base test image

on:
  workflow_dispatch:        # manual trigger — rebuild on demand
  push:
    branches: [main]
    paths:
      - tests/Dockerfile.build-base   # auto-rebuild when the base definition changes

jobs:
  build-and-push:
    runs-on: windows-2022

    permissions:
      packages: write       # required to push to GHCR

    steps:
      - uses: actions/checkout@v4

      - name: Switch to Windows containers
        shell: pwsh
        run: |
          $dockerCli = "$env:ProgramFiles\Docker\Docker\DockerCli.exe"
          if (Test-Path $dockerCli) {
            # Docker Desktop (local dev) — explicit switch required
            & $dockerCli -SwitchDaemon
            $deadline = (Get-Date).AddSeconds(60)
            do { Start-Sleep -Seconds 3; $info = docker info 2>&1 } while ((Get-Date) -lt $deadline -and ($info -notmatch "OSType: windows"))
          } else {
            # Docker Engine on Windows Server (CI) — already in Windows containers mode
            $info = docker info 2>&1
          }
          if ($info -notmatch "OSType: windows") { throw "Docker is not in Windows containers mode" }

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push
        shell: pwsh
        run: |
          $image = "ghcr.io/${{ github.repository_owner }}/standard-toolset/build-base:latest"
          docker build `
            --network nat `
            -f tests/Dockerfile.build-base `
            -t $image `
            .
          docker push $image
          Write-Host "Pushed: $image" -ForegroundColor Green
