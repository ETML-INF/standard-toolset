name: Build base test image

on:
  workflow_dispatch:        # manual trigger — rebuild on demand
  push:
    branches: [main]
    paths:
      - tests/Dockerfile.build-base   # auto-rebuild when the base definition changes

jobs:
  build-and-push:
    runs-on: windows-2022

    permissions:
      packages: write       # required to push to GHCR

    steps:
      - uses: actions/checkout@v4

      - name: Switch to Windows containers
        shell: pwsh
        run: |
          & "$env:ProgramFiles\Docker\Docker\DockerCli.exe" -SwitchDaemon
          # Wait for daemon to restart in Windows mode (switch is async)
          $deadline = (Get-Date).AddSeconds(60)
          do { Start-Sleep -Seconds 3; $info = docker info 2>&1 } while ((Get-Date) -lt $deadline -and ($info -notmatch "OSType: windows"))
          if ($info -notmatch "OSType: windows") { throw "Docker did not switch to Windows containers in time" }

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push
        shell: pwsh
        run: |
          $image = "ghcr.io/${{ github.repository_owner }}/standard-toolset/build-base:latest"
          docker build `
            --network nat `
            -f tests/Dockerfile.build-base `
            -t $image `
            .
          docker push $image
          Write-Host "Pushed: $image" -ForegroundColor Green
