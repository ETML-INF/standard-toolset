name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  update-tests:
    name: Update mode tests
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Run update mode tests
        shell: pwsh
        run: pwsh tests/Test-UpdateMode.ps1
