name: CI

on:
  push:
    branches: [main]
    # CHANGELOG.md is the only file release-please touches when it merges its own
    # release PR (chore(main): release x.y.z). No source changed → no point running
    # tests. Without this exclusion, every release merge would fire both ci.yml AND
    # release.yml, doubling validate-and-test for zero benefit.
    # NOTE: if release-please is ever reconfigured to also bump a version file
    # (e.g. version.txt), add it here too or CI will still trigger on release commits.
    paths-ignore:
      - 'CHANGELOG.md'
  pull_request:
    branches: [main]

# Runner pin: windows-2022 (OS build 20348 = ltsc2022, required for process-isolation containers).
# Update all three workflow files together if this ever needs to change.

jobs:
  test:
    name: Validate and test
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/validate-and-test

  build-tests:
    name: Build pipeline tests
    runs-on: windows-2022
    needs: test         # skip if validation or toolkit tests fail

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/switch-docker-windows

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # Pull cached base image (scoop + buckets pre-installed).
      # If not in GHCR yet (first run), build locally from nanoserver-ltsc2022.
      - name: Prepare base image
        shell: pwsh
        run: |
          $img = "ghcr.io/${{ github.repository_owner }}".ToLower() + "/standard-toolset/build-base:latest"
          docker pull $img
          if ($LASTEXITCODE -ne 0) {
            Write-Warning "Base image not in GHCR — building locally (first-run bootstrap)."
            # Use the GHCR-cached test-base (a re-tag of nanoserver-ltsc2022 pushed by
            # build-base-image.yml) so the fallback build never needs to reach MCR directly.
            $testBase = "ghcr.io/${{ github.repository_owner }}".ToLower() + "/standard-toolset/test-base:latest"
            pwsh tests/Build-BaseImage.ps1 -BaseImage $testBase
          }

      - name: Run build tests
        shell: pwsh
        run: |
          $img = "ghcr.io/${{ github.repository_owner }}".ToLower() + "/standard-toolset/build-base:latest"
          pwsh tests/Run-BuildTests.ps1 -BaseImage $img
