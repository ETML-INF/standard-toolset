name: release-please

on:
  push:
    branches:
      - main

# Runner pin: windows-2022 (OS build 20348 = ltsc2022, required for process-isolation containers).
# Update all three workflow files together if this ever needs to change.

permissions:
  contents: write
  pull-requests: write
  issues: write    # needed if using builtin secrets.GITHUB_TOKEN
  packages: read   # pull cached images from GHCR


jobs:
  release-please:
    runs-on: windows-2022
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: simple

      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need parent commit for diff

      # Skip tests when this commit is a release-please bump (only changelog/manifest
      # changed) AND the parent commit had a successful ci-tests.yml run.
      # If the parent CI failed we must still run tests — the code was never validated.
      - name: Detect release-please bump
        id: rp
        if: steps.release.outputs.release_created
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $parent  = git rev-parse HEAD^
          $changed = git diff --name-only $parent HEAD
          $releaseMeta = @('CHANGELOG.md', 'version.txt', '.release-please-manifest.json')
          $codeChanged = $changed | Where-Object { $_ -notin $releaseMeta }
          if ($codeChanged) {
            echo "skip=false" >> $env:GITHUB_OUTPUT
            exit 0
          }
          # Only skip if the parent commit has a successful ci-tests.yml run.
          $owner = "${{ github.repository_owner }}"
          $repo  = "${{ github.event.repository.name }}"
          $runs  = gh api "repos/$owner/$repo/actions/workflows/ci-tests.yml/runs?head_sha=$parent&status=success&per_page=1" | ConvertFrom-Json
          if ($runs.total_count -gt 0) {
            echo "skip=true" >> $env:GITHUB_OUTPUT
            Write-Host "Skipping CI -- release-please bump on top of a passing commit."
          } else {
            echo "skip=false" >> $env:GITHUB_OUTPUT
            Write-Host "Running CI -- parent commit has no successful CI run."
          }

      - uses: ./.github/actions/validate-and-test
        if: steps.release.outputs.release_created && steps.rp.outputs.skip != 'true'

      - name: Restore Scoop cache
        if: steps.release.outputs.release_created
        uses: actions/cache/restore@v4
        with:
                path: build\scoop\cache
                # Key on apps.json content: exact hit when no app changed (zero downloads),
                # prefix fallback when an app is added/updated (only new zips downloaded).
                key: scoop-cache-${{ hashFiles('apps.json') }}
                restore-keys: |
                              scoop-cache-

      # WARNING: scoop is added to the path only in that step
      - name: Build apps and generate packs
        if: steps.release.outputs.release_created
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.tag_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
             & .\build.ps1 apps.json

      - name: Generate versions.txt
        if: steps.release.outputs.release_created
        shell: pwsh
        run: |
             # versions.txt is the authoritative list of what is in this release — generated
             # from the manifest (not scoop list) so reused packs are included correctly.
             $m = Get-Content build\packs\release-manifest.json -Raw | ConvertFrom-Json
             $m.apps | Sort-Object name | ForEach-Object { "$($_.name)=$($_.version)" } |
                 Set-Content versions.txt
             
      - name: Save Scoop cache
        if: steps.release.outputs.release_created
        uses: actions/cache/save@v4
        with:
                path: build\scoop\cache
                key: scoop-cache-${{ hashFiles('apps.json') }}

      - name: Upload packs and scripts
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
             $tag = "${{ steps.release.outputs.tag_name }}"
             gh release upload $tag build\packs\release-manifest.json --clobber
             Get-ChildItem "build\packs\*.zip" | ForEach-Object {
                 gh release upload $tag $_.FullName --clobber
             }
             gh release upload $tag toolset.ps1 --clobber
             gh release upload $tag setup.ps1 --clobber
             gh release upload $tag versions.txt --clobber

