name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write # needed if using builtin secrets.GITHUB_TOKEN


jobs:
  release-please:
    runs-on: windows-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: simple

      - uses: actions/checkout@v4

      - name: Validates apps.json
        shell: pwsh
        run: if (-not (Get-Content -Raw apps.json | Test-Json)) { exit 1 }

      - name: Restore Scoop cache
        if: steps.release.outputs.release_created
        uses: actions/cache/restore@v4
        with:
                path: build\scoop\cache
                key: scoop-cache-dummy # never used, only use restore-keys
                restore-keys: |
                              scoop-cache-

      # WARNING: scoop is added to the path only in that step
      - name: Build apps and generate packs
        if: steps.release.outputs.release_created
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.tag_name }}
        run: |
             & .\build.ps1 apps.json

      # WARNING: use full path to scoop as PATH var has died in last step 
      # Generate hash from installed packages
      - name: Generate cache hash
        if: steps.release.outputs.release_created
        id: cache-hash
        shell: pwsh
        run: |
             build\scoop\shims\scoop list | Select-Object Name, Version > hash.txt 2>$null
             Get-Content hash.txt 
             $hash = (Get-FileHash hash.txt -Algorithm SHA256).Hash.Substring(0, 8)
             echo "hash=$hash" >> $env:GITHUB_OUTPUT
             mv hash.txt versions.txt
             
      # Save cache with new hash
      - name: Save Scoop cache
        if: steps.release.outputs.release_created
        uses: actions/cache/save@v4
        with:
                path: build\scoop\cache
                key: scoop-cache-${{ steps.cache-hash.outputs.hash }}

      - name: Upload packs and scripts
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
             $tag = "${{ steps.release.outputs.tag_name }}"
             gh release upload $tag build\packs\release-manifest.json
             Get-ChildItem "build\packs\*.zip" | ForEach-Object {
                 gh release upload $tag $_.FullName
             }
             gh release upload $tag toolset.ps1
             gh release upload $tag setup.ps1
             # versions.txt is produced by the existing 'Generate cache hash' step
             # (which does: scoop list > hash.txt; mv hash.txt versions.txt)
             gh release upload $tag versions.txt

