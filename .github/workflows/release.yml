name: release-please

on:
  push:
    branches:
      - main

# Runner pin: windows-2022 (OS build 20348 = ltsc2022, required for process-isolation containers).
# Update all three workflow files together if this ever needs to change.

permissions:
  contents: write
  pull-requests: write
  issues: write # needed if using builtin secrets.GITHUB_TOKEN


jobs:
  release-please:
    runs-on: windows-2022
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: simple

      - uses: actions/checkout@v4

      # Tests run HERE (not in ci.yml) for the release commit path.
      # Why: ci.yml excludes CHANGELOG.md-only pushes (the release-please merge commit),
      # so it is intentionally silent on release day. That means this is the sole test
      # gate before artifacts are built and uploaded. If tests fail the job stops here
      # and the subsequent build/upload steps never execute — the GitHub Release tag
      # exists but has no assets, which is recoverable (re-run the job).
      # Gated on release_created: for every non-release push to main, release-please
      # just updates its PR and exits; running tests there would be pure duplication
      # since ci.yml already ran them on that same commit.
      - uses: ./.github/actions/validate-and-test
        if: steps.release.outputs.release_created

      - name: Restore Scoop cache
        if: steps.release.outputs.release_created
        uses: actions/cache/restore@v4
        with:
                path: build\scoop\cache
                key: scoop-cache-dummy # never used, only use restore-keys
                restore-keys: |
                              scoop-cache-

      # WARNING: scoop is added to the path only in that step
      - name: Build apps and generate packs
        if: steps.release.outputs.release_created
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ steps.release.outputs.tag_name }}
        run: |
             & .\build.ps1 apps.json

      # WARNING: use full path to scoop as PATH var has died in last step 
      # Generate hash from installed packages
      - name: Generate cache hash
        if: steps.release.outputs.release_created
        id: cache-hash
        shell: pwsh
        run: |
             # Stable format: explicit Name=Version strings, sorted — immune to scoop output column changes.
             build\scoop\shims\scoop list |
                 Where-Object { $_ -is [PSCustomObject] -and $_.Name -and $_.Version } |
                 Sort-Object Name |
                 ForEach-Object { "$($_.Name)=$($_.Version)" } |
                 Set-Content hash.txt
             Get-Content hash.txt
             $hash = (Get-FileHash hash.txt -Algorithm SHA256).Hash.Substring(0, 8)
             "hash=$hash" | Add-Content $env:GITHUB_OUTPUT
             Move-Item hash.txt versions.txt
             
      # Save cache with new hash
      - name: Save Scoop cache
        if: steps.release.outputs.release_created
        uses: actions/cache/save@v4
        with:
                path: build\scoop\cache
                key: scoop-cache-${{ steps.cache-hash.outputs.hash }}

      - name: Upload packs and scripts
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
             $tag = "${{ steps.release.outputs.tag_name }}"
             gh release upload $tag build\packs\release-manifest.json --clobber
             Get-ChildItem "build\packs\*.zip" | ForEach-Object {
                 gh release upload $tag $_.FullName --clobber
             }
             gh release upload $tag toolset.ps1 --clobber
             gh release upload $tag setup.ps1 --clobber
             # versions.txt is produced by the existing 'Generate cache hash' step
             # (which does: scoop list > hash.txt; Move-Item hash.txt versions.txt)
             gh release upload $tag versions.txt --clobber

